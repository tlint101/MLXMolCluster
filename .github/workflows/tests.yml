name: MLXMolCluster Test
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # python versions
        python-version: [ "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install macOS System Dependencies
        run: |
          # macOS uses Homebrew, not apt-get
          brew install cairo

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # This will install mlx and other deps from your pyproject.toml
          pip install -e .
          pip install "CairoSVG>=2.7.1" pytest

      # run tests
      - name: Run Tests
        run: |
          python -m pytest